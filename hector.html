<form id="specialForm">

    <input
    type="text"
    id="specialName"
    placeholder="Your Name"
    required>

    <br><br>

    <textarea
    id="requestText"
    placeholder="Describe what you want printed"
    required></textarea>

    <br><br>

    <input
    type="number"
    id="printTime"
    placeholder="Estimated half-hours of printing"
    required>

    <br><br>

    <button type="submit">
        Submit Request
    </button>

</form>

<script type="module" src="script.js"></script>
